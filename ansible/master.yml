---
- name: Deploy Kubernetes The Hard Way
  import_playbook: playbooks/prepare.yml

- name: Setup Infrastructure Components
  import_playbook: playbooks/discribute_certs_kubeconfig.yml

- name: Deploy etcd Cluster
  import_playbook: playbooks/etcd.yml

- name: Deploy Control Plane
  import_playbook: playbooks/control_plane.yml

- name: Deploy Worker Nodes
  import_playbook: playbooks/workers.yml

- name: Finalize Configuration
  hosts: controller-0
  become: yes
  tasks:
    - name: Wait for nodes to be ready
      command: kubectl get nodes --kubeconfig /var/lib/kubernetes/admin.kubeconfig
      register: nodes_status
      until: nodes_status.rc == 0
      retries: 10
      delay: 5

    - name: Show cluster status
      debug:
        msg: "Поздравляю! Кластер развернут. Проверь статус: kubectl get nodes"
