---
- name: Create directories on controllers
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /var/lib/kubernetes
  when: "'controllers' in group_names"

- name: Create directories on workers
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /var/lib/kubelet
    - /var/lib/kube-proxy
  when: "'workers' in group_names"

- name: Copy etcd server certs (per host)
  copy:
    src: "/home/vladimir/k8s-the-hard-way/certs/{{ inventory_hostname }}-etcd.pem"
    dest: "/var/lib/kubernetes/{{ inventory_hostname }}-etcd.pem"
    mode: "0644"
  when: "'controllers' in group_names"

- name: Copy etcd server keys (per host)
  copy:
    src: "/home/vladimir/k8s-the-hard-way/certs/{{ inventory_hostname }}-etcd-key.pem"
    dest: "/var/lib/kubernetes/{{ inventory_hostname }}-etcd-key.pem"
    mode: "0600"
  when: "'controllers' in group_names"

- name: Copy etcd client certs
  copy:
    src: "/home/vladimir/k8s-the-hard-way/certs/etcd-client.pem"
    dest: "/var/lib/kubernetes/etcd-client.pem"
    mode: "0644"
  when: "'controllers' in group_names"

- name: Copy etcd client keys
  copy:
    src: "/home/vladimir/k8s-the-hard-way/certs/etcd-client-key.pem"
    dest: "/var/lib/kubernetes/etcd-client-key.pem"
    mode: "0600"
  when:
    "'controllers' in group_names"

    # --- КОНТРОЛЛЕРЫ: Сертификаты ---
- name: Copy controller public certs
  copy:
    src: "/home/vladimir/k8s-the-hard-way/certs/{{ item }}"
    dest: /var/lib/kubernetes/{{ item }}
    mode: "0644"
  loop:
    - ca.pem
    - kubernetes.pem
    - service-account.pem
  when: "'controllers' in group_names"

- name: Copy controller private keys
  copy:
    src: "/home/vladimir/k8s-the-hard-way/certs/{{ item }}"
    dest: /var/lib/kubernetes/{{ item }}
    mode: "0600"
  loop:
    - ca-key.pem
    - kubernetes-key.pem
    - service-account-key.pem
  when:
    "'controllers' in group_names"

    # --- КОНТРОЛЛЕРЫ: Kubeconfigs ---
- name: Copy controller kubeconfigs
  copy:
    src: "/home/vladimir/k8s-the-hard-way/certs/{{ item }}.kubeconfig"
    dest: "/var/lib/kubernetes/{{ item }}.kubeconfig"
    mode: "0600"
  loop:
    - kube-controller-manager
    - kube-scheduler
    - admin
  when:
    "'controllers' in group_names"

    # --- ВОРКЕРЫ: Сертификаты ---
- name: Copy worker certs
  copy:
    src: "/home/vladimir/k8s-the-hard-way/certs/{{ item }}"
    dest: /var/lib/kubelet/{{ item }}
    mode: "0600"
  loop:
    - ca.pem
    - "{{ inventory_hostname }}.pem"
    - "{{ inventory_hostname }}-key.pem"
  when:
    "'workers' in group_names"

    # --- ВОРКЕРЫ: Kubeconfigs ---
- name: Copy worker kubelet kubeconfig
  copy:
    src: "/home/vladimir/k8s-the-hard-way/certs/{{ inventory_hostname }}.kubeconfig"
    dest: "/var/lib/kubelet/kubeconfig"
    mode: "0600"
  when: "'workers' in group_names"

- name: Copy kube-proxy kubeconfig
  copy:
    src: "/home/vladimir/k8s-the-hard-way/certs/kube-proxy.kubeconfig"
    dest: "/var/lib/kube-proxy/kubeconfig"
    mode: "0600"
  when: "'workers' in group_names"
