---
- name: Bootstrap Kubernetes Worker Nodes
  hosts: workers
  become: yes
  vars:
    k8s_version: "1.34.1"
    containerd_version: "1.7.13"
    runc_version: "1.1.12"
    cni_plugins_version: "1.4.0"
    # Динамически генерируем Pod CIDR (например, worker-0 -> 10.200.0.0/24)
    worker_index: "{{ inventory_hostname | regex_replace('^.*-([0-9]+)$', '\\1') }}"
    pod_cidr: "10.200.{{ worker_index }}.0/24"

  tasks:
    - name: Create required directories
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /etc/cni/net.d
        - /opt/cni/bin
        - /var/lib/kubelet
        - /var/lib/kube-proxy
        - /var/lib/kubernetes
        - /var/run/kubernetes
        - /etc/containerd

    - name: Download Kubernetes binaries
      get_url:
        url: "https://dl.k8s.io/v{{ k8s_version }}/bin/linux/amd64/{{ item }}"
        dest: "/usr/local/bin/{{ item }}"
        mode: "0755"
      loop:
        - kubectl
        - kube-proxy
        - kubelet

    - name: Download runc binary
      get_url:
        url: "https://github.com/opencontainers/runc/releases/download/v{{ runc_version }}/runc.amd64"
        dest: "/usr/local/bin/runc"
        mode: "0755"

    - name: Download and extract CNI plugins
      unarchive:
        src: "https://github.com/containernetworking/plugins/releases/download/v{{ cni_plugins_version }}/cni-plugins-linux-amd64-v{{ cni_plugins_version }}.tgz"
        dest: /opt/cni/bin/
        remote_src: yes

    - name: Download and extract containerd
      unarchive:
        src: "https://github.com/containerd/containerd/releases/download/v{{ containerd_version }}/containerd-{{ containerd_version }}-linux-amd64.tar.gz"
        dest: /usr/local/
        remote_src: yes

    - name: Configure containerd
      template:
        src: ../templates/containerd-config.toml.j2
        dest: /etc/containerd/config.toml
      notify: restart containerd

    - name: Create containerd systemd service
      copy:
        dest: /etc/systemd/system/containerd.service
        content: |
          [Unit]
          Description=containerd container runtime
          Documentation=https://containerd.io
          After=network.target local-fs.target

          [Service]
          ExecStartPre=-/sbin/modprobe overlay
          ExecStart=/usr/local/bin/containerd
          Type=notify
          Delegate=yes
          KillMode=process
          Restart=always
          RestartSec=5
          LimitNPROC=infinity
          LimitCORE=infinity
          LimitNOFILE=infinity
          TasksMax=infinity
          OOMScoreAdjust=-999

          [Install]
          WantedBy=multi-user.target

    - name: Configure Kubelet
      template:
        src: ../templates/kubelet-config.yaml.j2
        dest: /var/lib/kubelet/kubelet-config.yaml
      notify: restart kubelet

    - name: Configure Kubelet service
      template:
        src: ../templates/kubelet.service.j2
        dest: /etc/systemd/system/kubelet.service
      notify: restart kubelet

    - name: Configure Kube-Proxy service
      template:
        src: ../templates/kube-proxy.service.j2
        dest: /etc/systemd/system/kube-proxy.service
      notify: restart kube-proxy

    - name: Create CNI configuration from central roles/templates
      template:
        src: "../templates/{{ item.src }}"
        dest: "/etc/cni/net.d/{{ item.dest }}"
      loop:
        - { src: "bridge.conf.j2", dest: "bridge.conf" }
        - { src: "loopback.conf.j2", dest: "loopback.conf" }
      notify: restart kubelet

    - name: Configure Kube-Proxy config
      template:
        src: ../templates/kube-proxy-config.yaml.j2
        dest: /var/lib/kube-proxy/kube-proxy-config.yaml
      notify: restart kube-proxy

    - name: Start and enable worker services
      systemd:
        name: "{{ item }}"
        state: started
        enabled: yes
        daemon_reload: yes
      loop:
        - containerd
        - kubelet
        - kube-proxy

    - name: Install net-tools for route management
      apt:
        name: net-tools
        state: present

    - name: Configure static routes between worker nodes
      shell: |
        {% for host in groups['workers'] %}
        {% if host != inventory_hostname %}
        {% set remote_index = host | regex_replace('^.*-([0-9]+)$', '\\1') %}
        {% set remote_cidr = "10.200." ~ remote_index ~ ".0/24" %}
        ip route add {{ remote_cidr }} via {{ hostvars[host]['ansible_host'] }} || true
        {% endif %}
        {% endfor %}
      args:
        executable: /bin/bash
      register: routes_out
      changed_when: false # Маршруты — вещь динамическая, для простоты не будем трекать change

    - name: Enable IP Forwarding
      sysctl:
        name: net.ipv4.ip_forward
        value: "1"
        state: present
        reload: yes

    - name: Load br_netfilter module
      modprobe:
        name: br_netfilter
        state: present

    - name: Ensure bridge-nf-call-iptables is enabled
      sysctl:
        name: "{{ item }}"
        value: "1"
        state: present
        reload: yes
      loop:
        - net.bridge.bridge-nf-call-iptables
        - net.bridge.bridge-nf-call-ip6tables

  handlers:
    - name: restart containerd
      systemd:
        name: containerd
        state: restarted
        daemon_reload: yes
    - name: restart kubelet
      systemd:
        name: kubelet
        state: restarted
        daemon_reload: yes
    - name: restart kube-proxy
      systemd:
        name: kube-proxy
        state: restarted
        daemon_reload: yes
